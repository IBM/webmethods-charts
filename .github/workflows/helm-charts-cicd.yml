name: Helm Charts CI/CD

on:
  pull_request:
    branches:
      - 'main'
      - 'release/**'
  push:
    branches:
      - 'main'
      - 'release/**'

permissions:
  contents: write

env:
  GIT_ASKPASS: /tmp/gitaskpass.sh

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.get-changed-charts.outputs.charts }}
      has-changes: ${{ steps.get-changed-charts.outputs.has-changes }}
      charts-list: ${{ steps.get-changed-charts.outputs.charts-list }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          path: source

      - name: Get changed files
        id: changed-files
        working-directory: source
        run: |
          # Handle different event types
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            before="${{ github.event.pull_request.base.sha }}"
            after="${{ github.event.pull_request.head.sha }}"
          else
            # For push events
            before="${{ github.event.before }}"
            after="${{ github.event.after }}"
          fi
          
          # Handle initial commit (before is all zeros)
          if [[ "$before" =~ ^0+$ ]]; then
            changed_files=$(git ls-tree -r "$after" --name-only | tr '\n' ' ')
          else
            changed_files=$(git diff --name-only "$before" "$after" | tr '\n' ' ')
          fi
          
          echo "all_changed_files=$changed_files" >> $GITHUB_OUTPUT

      - name: Extract chart directories from changed files
        id: get-changed-charts
        working-directory: source
        run: |
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          
          if [ -z "$changed_files" ]; then
            echo "No files changed"
            echo "charts=[]" >> $GITHUB_OUTPUT
            echo "charts-list=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed files: $changed_files"
          
          # Extract unique root-level directories from changed files (exclude binary and hidden dirs)
          charts_json="["
          charts_list=""
          first=true
          seen_charts=""
          
          for file in $changed_files; do
            # Get the root-level directory (first path component)
            chart_dir=$(echo "$file" | cut -d'/' -f1)
            
            # Skip if already processed, is binary, starts with dot, or is not a directory
            if ! echo "$seen_charts" | grep -q "^${chart_dir}$" && [ "$chart_dir" != "binary" ] && [[ ! "$chart_dir" =~ ^\. ]] && [ -d "$chart_dir" ]; then
              echo "Found changed chart: $chart_dir"
              seen_charts="${seen_charts}${chart_dir}"$'\n'
              
              # Build JSON array for matrix
              if [ "$first" = true ]; then
                charts_json="${charts_json}\"${chart_dir}\""
                first=false
              else
                charts_json="${charts_json},\"${chart_dir}\""
              fi
              
              # Build space-separated list for refresh job
              charts_list="${charts_list} ${chart_dir}"
            fi
          done
          
          charts_json="${charts_json}]"
          charts_list=$(echo "$charts_list" | xargs)  # Trim leading/trailing spaces
          
          if [ "$charts_json" = "[]" ]; then
            echo "No valid chart changes detected"
            echo "charts=[]" >> $GITHUB_OUTPUT
            echo "charts-list=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed charts (JSON): $charts_json"
            echo "Changed charts (list): $charts_list"
            echo "charts=$charts_json" >> $GITHUB_OUTPUT
            echo "charts-list=$charts_list" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

  verify:
    if: ${{ github.event_name == 'pull_request' && needs.detect-changes.outputs.has-changes == 'true' }}
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ${{ fromJson(needs.detect-changes.outputs.charts) }}
      fail-fast: false
    steps:


      
        
      - name: Download and install binaries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching binaries from 'binaries' release..."
          
          # Create temp directory for binaries
          BINARIES_DIR=".github/tmp-binaries"
          mkdir -p "$BINARIES_DIR"
          cd "$BINARIES_DIR"
          
          # Download all .bin assets from the 'binaries' release
          gh release download binaries --repo ${{ github.repository }} --pattern '*.bin' || true
          
          # Install all .bin files to /usr/local/bin
          for binary in *.bin; do
            if [ -f "$binary" ]; then
              # Remove .bin extension for the installed binary name
              binary_name=$(basename "$binary" .bin)
              echo "Installing $binary to /usr/local/bin/$binary_name..."
              sudo install -m 755 "$binary" "/usr/local/bin/$binary_name"
            fi
          done
          
          echo "All binaries are installed."
          cd -
          rm -rf "$BINARIES_DIR"

        
      - name: Checkout source branch
        uses: actions/checkout@v6.0.3
        with:
          path: source

      - name: Checkout repository branch
        uses: actions/checkout@v6.0.3
        with:
          ref: repository
          path: repository

      - name: Validate chart directory name matches Chart.yaml name for ${{ matrix.chart }}
        working-directory: source
        run: |
          chartDir="${{ matrix.chart }}"
          chartNameInYaml=$(yq eval '.name' $chartDir/Chart.yaml)
          
          echo "Chart directory: $chartDir"
          echo "Chart name in Chart.yaml: $chartNameInYaml"
          
          if [ "$chartDir" != "$chartNameInYaml" ]; then
            echo "::error::Chart directory name '$chartDir' does not match the name '$chartNameInYaml' in Chart.yaml"
            echo "❌ Chart directory name '$chartDir' does not match the name '$chartNameInYaml' in Chart.yaml" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "Chart directory name validation passed - directory name matches Chart.yaml name"
            echo "✅ Chart directory name validation passed - '$chartDir' matches Chart.yaml name" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate README.md exists for ${{ matrix.chart }}
        working-directory: source
        run: |
          chartDir="${{ matrix.chart }}"
          readmePath="$chartDir/README.md"
          
          echo "Checking for README.md in $chartDir..."
          
          if [ ! -f "$readmePath" ]; then
            echo "::error::Chart directory '$chartDir' is missing a README.md file"
            echo "❌ Chart directory '$chartDir' is missing a README.md file" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "README.md validation passed - file exists in $chartDir"
            echo "✅ README.md validation passed - file exists in $chartDir" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate chart version for ${{ matrix.chart }}
        run: |
          chartName="${{ matrix.chart }}"
          cd source
          chartVersion=$(yq eval '.version' $chartName/Chart.yaml)
          
          echo "Chart: $chartName, Version: $chartVersion"

          cd ../repository
          # Check if this version already exists in repository branch
          packagedChart="${chartName}-${chartVersion}.tgz"
          
          if [ -f "$packagedChart" ]; then
            echo "::error::Chart $chartName with version $chartVersion already exists in repository"
            echo "❌ Chart $chartName with version $chartVersion already exists in repository. Chart changes should be reflected using semantic versioning updates." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "Chart version validation passed - $chartName:$chartVersion is new"
            echo "✅ Chart version validation passed - $chartName:$chartVersion is a new version" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify packaging and helm template ${{ matrix.chart }}
        working-directory: source
        run: |
          echo "Processing chart: ${{ matrix.chart }}"
          helm package ${{ matrix.chart }}
          helm template ci-run-${{ github.run_number }}-${{ matrix.chart }} ${{ matrix.chart }}

  ci-status:
    name: CI Status
    if: ${{ github.event_name == 'pull_request' && always() }}
    needs: [ detect-changes, verify ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify that CI is a success
        run: |
          if [[ 'false' == ${{ (needs.detect-changes.result == 'success' || needs.detect-changes.result == 'skipped') && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }} ]]; then
            exit 1
          fi
          
      - name: Get GitHub App Token
        id: action-github-app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.GITHUBCOM_CHARTS_APP_ID }}
          private-key: ${{ secrets.GITHUBCOM_CHARTS_APP_PEM }}     
      
      - name: Checkout
        uses: actions/checkout@v6.0.3


      - name: Enable Auto Merge
        env:
          GH_TOKEN: ${{ steps.action-github-app-token.outputs.token }}
        run: |
          gh pr merge --auto --merge ${{ github.event.pull_request.html_url }}

  refresh:
    name: Refresh Chart Repository
    if: |
      github.event_name == 'push' &&
      needs.detect-changes.outputs.has-changes == 'true'
    needs: [ detect-changes ]
    runs-on: ubuntu-latest
    steps:
      - name: Get GitHub App Token
        id: action-github-app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.GITHUBCOM_CHARTS_APP_ID }}
          private-key: ${{ secrets.GITHUBCOM_CHARTS_APP_PEM }}

      - name: Checkout source branch
        uses: actions/checkout@v6.0.3
        with:
          path: source
          fetch-depth: 0
          token: ${{ steps.action-github-app-token.outputs.token }}


      - name: Download and install binaries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Fetching binaries from 'binaries' release..."
          
          # Create temp directory for binaries
          BINARIES_DIR="source/.github/tmp-binaries"
          mkdir -p "$BINARIES_DIR"
          cd "$BINARIES_DIR"
          
          # Download all .deb and .bin assets from the 'binaries' release
          gh release download binaries --repo ${{ github.repository }} --pattern '*.deb' || true
          gh release download binaries --repo ${{ github.repository }} --pattern '*.bin' || true
          
          # Install all downloaded .deb files
          for binary in *.deb; do
            if [ -f "$binary" ]; then
              echo "Installing $binary..."
              sudo dpkg -i "$binary"
            fi
          done
          
          # Install all .bin files to /usr/local/bin
          for binary in *.bin; do
            if [ -f "$binary" ]; then
              # Remove .bin extension for the installed binary name
              binary_name=$(basename "$binary" .bin)
              echo "Installing $binary to /usr/local/bin/$binary_name..."
              sudo install -m 755 "$binary" "/usr/local/bin/$binary_name"
            fi
          done
          
          echo "All binaries are installed."
          cd -
          rm -rf "$BINARIES_DIR"


      - name: Checkout repository branch
        uses: actions/checkout@v6.0.3
        with:
          path: repository
          ref: repository
          token: ${{ steps.action-github-app-token.outputs.token }}

      - name: Package and index
        run: |
          echo "Begin repository handling and indexing..."
          
          WORKDIR=$(pwd)/source
          changed_charts="${{ needs.detect-changes.outputs.charts-list }}"

          # run helm docs
          helmDocFileName=helmValues.md
          cd "$WORKDIR"
          helm-docs -o $helmDocFileName

          cd $(pwd)/../repository

          echo "Processing charts: $changed_charts"

          for helmChartName in $changed_charts; do
            subdir="$WORKDIR/$helmChartName"
            if [[ -d "$subdir" ]]; then
              echo "------Processing directory: $helmChartName"

              chartVersion=$(yq eval '.version' $subdir/Chart.yaml)
              appVersion=$(yq eval '.appVersion' $subdir/Chart.yaml)
              helmChartLocation=helm-charts/$helmChartName/$appVersion/$chartVersion
              mkdir -p "$helmChartLocation"

              echo "Copy helm chart '$helmChartName' at $helmChartLocation in repository branch"
              cp -r $subdir/. $helmChartLocation

              echo "Generating used images for $helmChartLocation .."
              helm template "image-scan" $subdir \
                | awk '
                    /^[[:space:]]*image:[[:space:]]*/ {
                      line = $0
                      sub(/^[[:space:]]*image:[[:space:]]*/, "", line)
                      sub(/[[:space:]]+#.*/, "", line)
                      gsub(/^["'\''"]|["'\''"]$/, "", line)
                      if (line != "") print line
                    }
                  ' \
                | sort -u > $helmChartLocation/usedImages.txt

              echo "Packaging helm chart '$helmChartName' at $helmChartLocation in repository branch"
              helm package $subdir
            fi
          done
          
          helm repo index --url ${{ vars.CHART_REPOSITORY_INDEX_URL }} .

      - name: Push to repository branch
        working-directory: repository
        run: |
          echo "GITHUB_TOKEN=${{ steps.action-github-app-token.outputs.token }}" >> $GITHUB_ENV
          echo 'echo ${GITHUB_TOKEN}' >$GIT_ASKPASS
          chmod +x $GIT_ASKPASS
          
          git config user.name "wm-charts-writer[bot]"
          git config user.email "wm-charts-writer[bot]@users.noreply.github.com"
          git add .
          git commit -m "Refreshing charts repository" || true
          git push
