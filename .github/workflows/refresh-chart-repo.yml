name: Refresh Chart Repository

on:
  push:
    branches:
      - 'main'
      - 'release/**'

permissions:
  contents: write
env:
  GIT_ASKPASS: /tmp/gitaskpass.sh
jobs:
  Refresh:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }} 
    steps:
          
      - name: Checkout source branch
        uses: actions/checkout@v6.0.3
        with:
          path: source
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        working-directory: source
        run: |
          # Use the before/after commits from the push event
          before="${{ github.event.before }}"
          after="${{ github.event.after }}"
          
          # Handle initial commit (before is all zeros)
          if [[ "$before" =~ ^0+$ ]]; then
            changed_files=$(git ls-tree -r "$after" --name-only | tr '\n' ' ')
          else
            changed_files=$(git diff --name-only "$before" "$after" | tr '\n' ' ')
          fi
          
          echo "all_changed_files=$changed_files" >> $GITHUB_OUTPUT

      - name: Detect changed charts
        id: detect-charts
        working-directory: source
        run: |
          echo "Detecting changed charts from push event..."
          changed_files="${{ steps.changed-files.outputs.all_changed_files }}"
          
          if [ -z "$changed_files" ]; then
            echo "No files changed"
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Changed files: $changed_files"
          
          # Extract unique root-level directories from changed files
          changed_charts=""
          seen_charts=""
          
          for file in $changed_files; do
            chart_dir=$(echo "$file" | cut -d'/' -f1)
            
            if ! echo "$seen_charts" | grep -q "^${chart_dir}$" && [ "$chart_dir" != "binary" ] && [[ ! "$chart_dir" =~ ^\. ]] && [ -d "$chart_dir" ]; then
              echo "Found changed chart: $chart_dir"
              seen_charts="${seen_charts}${chart_dir}"$'\n'
              changed_charts="${changed_charts} ${chart_dir}"
            fi
          done
          
          if [ -z "$changed_charts" ]; then
            echo "No chart changes detected"
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Charts to process: $changed_charts"
          echo "charts=$changed_charts" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT


      - name: Download and install binaries from release
        if: steps.detect-charts.outputs.has-changes == 'true'
        run: |
          echo "Fetching binaries from 'binaries' release..."
          
          # Create temp directory for binaries
          BINARIES_DIR="source/.github/tmp-binaries"
          mkdir -p "$BINARIES_DIR"
          cd "$BINARIES_DIR"
          
          # Download all .deb and .bin assets from the 'binaries' release
          gh release download binaries --repo ${{ github.repository }} --pattern '*.deb' || true
          gh release download binaries --repo ${{ github.repository }} --pattern '*.bin' || true
          
          # Install all downloaded .deb files
          for binary in *.deb; do
            if [ -f "$binary" ]; then
              echo "Installing $binary..."
              sudo dpkg -i "$binary"
            fi
          done
          
          # Install all .bin files to /usr/local/bin
          for binary in *.bin; do
            if [ -f "$binary" ]; then
              # Remove .bin extension for the installed binary name
              binary_name=$(basename "$binary" .bin)
              echo "Installing $binary to /usr/local/bin/$binary_name..."
              sudo install -m 755 "$binary" "/usr/local/bin/$binary_name"
            fi
          done
          
          echo "All binaries are installed."
          cd -
          rm -rf "$BINARIES_DIR"


      - name: Checkout repository branch
        if: steps.detect-charts.outputs.has-changes == 'true'
        uses: actions/checkout@v6.0.3
        with:
          path: repository
          ref: repository

      - name: Package and index
        if: steps.detect-charts.outputs.has-changes == 'true'
        run: |
          echo "Begin repository handling and indexing..."
          
          WORKDIR=$(pwd)/source
          changed_charts="${{ steps.detect-charts.outputs.charts }}"

          # run helm docs
          helmDocFileName=helmValues.md
          cd "$WORKDIR"
          helm-docs -o $helmDocFileName

          cd $(pwd)/../repository

          echo "Processing charts: $changed_charts"

          for helmChartName in $changed_charts; do
            subdir="$WORKDIR/$helmChartName"
            if [[ -d "$subdir" ]]; then
              echo "------Processing directory: $helmChartName"

              chartVersion=$(yq eval '.version' $subdir/Chart.yaml)
              appVersion=$(yq eval '.appVersion' $subdir/Chart.yaml)
              helmChartLocation=helm-charts/$helmChartName/$appVersion/$chartVersion
              mkdir -p "$helmChartLocation"

              echo "Copy helm chart '$helmChartName' at $helmChartLocation in repository branch"
              cp -r $subdir/. $helmChartLocation

              echo "Generating used images for $helmChartLocation .."
              helm template "image-scan" $subdir \
                | awk '
                    /^[[:space:]]*image:[[:space:]]*/ {
                      line = $0
                      sub(/^[[:space:]]*image:[[:space:]]*/, "", line)
                      sub(/[[:space:]]+#.*/, "", line)
                      gsub(/^["'\''"]|["'\''"]$/, "", line)
                      if (line != "") print line
                    }
                  ' \
                | sort -u > $helmChartLocation/usedImages.txt

              echo "Packaging helm chart '$helmChartName' at $helmChartLocation in repository branch"
              helm package $subdir
            fi
          done
          
          helm repo index --url ${{ vars.CHART_REPOSITORY_INDEX_URL }} --merge index.yaml .

      - name: Push to repository branch
        if: steps.detect-charts.outputs.has-changes == 'true'
        working-directory: repository
        run: |
          echo "GITHUB_TOKEN=${{ steps.action-github-app-token.outputs.token }}" >> $GITHUB_ENV
          echo 'echo ${GITHUB_TOKEN}' >$GIT_ASKPASS
          chmod +x $GIT_ASKPASS
          
          git config user.name "read-and-write[bot]"
          git config user.email "read-and-write[bot]@users.noreply.github.com"
          git add .
          git commit -m "Refreshing charts repository" || true
          git push
